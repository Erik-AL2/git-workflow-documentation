<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #0a0a0a; }
      .branch-line { stroke: #ffffff; }
      .node { fill: #ffffff; }
      .accent { fill: #3b82f6; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #ffffff; }
      .branch-line { stroke: #0a0a0a; }
      .node { fill: #0a0a0a; }
      .accent { fill: #3b82f6; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />

  <!-- Git branch icon -->
  <g transform="translate(90, 90)">
    <!-- Main vertical line -->
    <line class="branch-line" x1="0" y1="-50" x2="0" y2="50" stroke-width="8" stroke-linecap="round"/>

    <!-- Branch line going right -->
    <path class="branch-line" d="M 0 -20 Q 20 -20, 35 0" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Top node (commit) -->
    <circle class="node" cx="0" cy="-50" r="14"/>

    <!-- Middle node (branch point) -->
    <circle class="accent" cx="0" cy="-20" r="14"/>

    <!-- Branch end node -->
    <circle class="node" cx="35" cy="0" r="14"/>

    <!-- Bottom node (commit) -->
    <circle class="node" cx="0" cy="50" r="14"/>
  </g>
</svg>
